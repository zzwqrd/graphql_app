name: graphql_app
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter_screenutil: ^5.9.3
  equatable: ^2.0.8
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  dio: ^5.9.0
  get_it: ^9.2.0
  shimmer: ^3.0.0
  flutter_svg_provider: ^1.0.7
  flutter_svg: ^2.2.3
  lottie: ^3.3.2
  path_provider: ^2.1.5
  flash: ^3.1.1
  image_picker: ^1.2.1
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.1
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  flutter_widget_from_html: ^0.17.1
  flutter_dotenv: ^6.0.0
  encrypt: ^5.0.3
  build_runner: ^2.10.5
  flutter_spinkit: ^5.2.2
  croppy: ^1.4.1
  dartz: ^0.10.1
  carousel_slider: ^5.1.1
  flutter_staggered_grid_view: ^0.7.0
  internet_connection_checker_plus: ^2.9.1+2
  shared_preferences: ^2.5.4
  flutter_gen_runner: ^5.12.0
  flutter_html: ^3.0.0
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.12.0
  intl: ^0.20.2
  dots_indicator: ^4.0.1
  g_recaptcha_v3: ^1.0.0
  # google_maps_flutter:
#  telr_mobile_payment_sdk: ^3.0.3
  go_router: ^17.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/gen
  line_length: 50

  integrations:
    flutter_svg: true
    lottie: true

  assets:
    enabled: true

    outputs:
      class_name: MyAssets

  fonts:
    enabled: true
    outputs:
      class_name: MyFontFamily




flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/lang/

  fonts:
    - family: Black
      fonts:
        - asset: assets/fonts/Cairo-Black.ttf
    - family: ExtraBold
      fonts:
        - asset: assets/fonts/Cairo-ExtraBold.ttf
    - family: CairoBold
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
    - family: CairoRegular
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
    - family: CairoSemiBold
      fonts:
        - asset: assets/fonts/Cairo-SemiBold.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon_app_g.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
